<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primer HTML</title>
</head>

<body style="background-color: gray; height: 100vh;">
    <nav style="background-color: black; color: white; padding: 10px;">
        <a href="#" style="color: white; margin-right: 10px;">Inicio</a>
        <a href="#" style="color: white; margin-right: 10px;">Acerca de</a>
        <a href="#" style="color: white;">Contacto</a>
    </nav>
    <main style="display: flex;">
        <aside style="background-color: lightgray; padding: 10px; float: left; width: 200px;">
            <h2>Menú</h2>
            <ul>
                <li><a href="#">Opción 1</a></li>
                <li><a href="#">Opción 2</a></li>
                <li><a href="#">Opción 3</a></li>
            </ul>
        </aside>

        <section style="padding: 10px; width: 100%;">
            <h1 style="background-color: burlywood;">
                Hola mundo del HTML5
            </h1>
            <h2>Daniel</h2>
            <details style="margin-top: 20px;">
                <summary>Más información</summary>
                <p>Aquí puedes encontrar más detalles sobre el tema.</p>
            </details>
            <div>
                Ingresa tu nombre
                <input type="text" placeholder="Escribe algo aquí..."
                    style="margin-top: 10px; padding: 5px; width: 20%;">
                <input type="password" style="margin-top: 10px; padding: 5px; width: 20%;">
                <input type="button" value="Enviar" style="margin-top: 10px; padding: 5px 10px;">
            </div>
        </section>

        <aside style="background-color: lightgray; padding: 10px; float: right; width: 200px;">
            <h2>Noticias</h2>
            <p>Últimas noticias aquí.</p>
        </aside>
    </main>
    <footer style="background-color: black; color: white; text-align: center; padding: 10px; margin-top: 20px;">
        Este es el pie de página de mi sitio web.
    </footer>
</body>

</html>
